{

  "@type":"FAQPage",
  "mainEntity":[
    {"@type":"Question","name":"What is Northbeam?","acceptedAnswer":{"@type":"Answer","text":"Northbeam is a nationwide platform that helps consumers connect with independent service providers across all 50 states, counties, and cities."}},
    {"@type":"Question","name":"How does Northbeam connect me with a provider?","acceptedAnswer":{"@type":"Answer","text":"You submit a request with your location and service category. We match you with available independent providers in your area, who may then reach out with quotes or scheduling options."}},
    {"@type":"Question","name":"What services are available on Northbeam?","acceptedAnswer":{"@type":"Answer","text":"Northbeam supports multiple residential and commercial service categories. Availability varies by category and location."}},
    {"@type":"Question","name":"Do you guarantee a provider will be available?","acceptedAnswer":{"@type":"Answer","text":"No. Northbeam does not guarantee provider availability, response times, pricing, or the quality of work performed by any independent provider."}},
    {"@type":"Question","name":"How is pricing determined?","acceptedAnswer":{"@type":"Answer","text":"Pricing is set by each independent provider. Northbeam may show estimated ranges based on category and location, but final pricing is determined between you and the provider."}},
    {"@type":"Question","name":"Does Northbeam provide estimates?","acceptedAnswer":{"@type":"Answer","text":"Estimates shown on Northbeam are illustrative ranges only and are not quotes or offers of service. They do not reflect the final price you may be quoted by a provider."}},
    {"@type":"Question","name":"Do you operate in all 50 states?","acceptedAnswer":{"@type":"Answer","text":"Northbeam's directory framework covers all 50 states; however, provider coverage within each state, county, and city varies and may change over time."}},
    {"@type":"Question","name":"What if no providers are available in my area?","acceptedAnswer":{"@type":"Answer","text":"If no providers are currently available in your area, you may not receive matches. We cannot guarantee coverage in any specific location."}},
    {"@type":"Question","name":"Are the providers licensed and insured?","acceptedAnswer":{"@type":"Answer","text":"Northbeam does not verify, endorse, or guarantee any provider's licensing, insurance, certifications, or quality of work. You are responsible for verifying these details before hiring."}},
    {"@type":"Question","name":"How quickly will a provider contact me?","acceptedAnswer":{"@type":"Answer","text":"Response times vary. Northbeam does not guarantee that any provider will respond, nor how quickly a response may occur."}},
    {"@type":"Question","name":"Is Northbeam free to use?","acceptedAnswer":{"@type":"Answer","text":"Submitting a request is free for consumers. Any costs for services rendered are agreed between you and the independent provider."}},
    {"@type":"Question","name":"How do you protect my information?","acceptedAnswer":{"@type":"Answer","text":"We collect only the information necessary to match your request with providers and operate the service. See our Privacy Policy for full details."}},
    {"@type":"Question","name":"What is the difference between states, counties, and cities in your directory?","acceptedAnswer":{"@type":"Answer","text":"State pages cover an entire state. County pages cover a single county. City pages cover a single city or town. Each level shows service availability and local information."}},
    {"@type":"Question","name":"Why does coverage vary by location?","acceptedAnswer":{"@type":"Answer","text":"Coverage depends on the independent providers who actively participate in each market and is subject to change without notice."}},
    {"@type":"Question","name":"Can I request multiple service categories at once?","acceptedAnswer":{"@type":"Answer","text":"Yes. You may submit separate requests for each service category you need."}},
    {"@type":"Question","name":"Can I choose which provider matches with me?","acceptedAnswer":{"@type":"Answer","text":"Matching is based on availability and category. You are not obligated to engage with any matched provider."}},
    {"@type":"Question","name":"Does Northbeam perform the service directly?","acceptedAnswer":{"@type":"Answer","text":"No. Northbeam is a matching and directory platform only. Services are performed by independent providers, not by Northbeam."}},
    {"@type":"Question","name":"What happens if I have a dispute with a provider?","acceptedAnswer":{"@type":"Answer","text":"Disputes are between you and the independent provider. Northbeam may, at its discretion, assist communication but does not guarantee any resolution outcome."}},
    {"@type":"Question","name":"Do you offer commercial or residential services?","acceptedAnswer":{"@type":"Answer","text":"Both may be supported depending on category and provider availability in your location."}},
    {"@type":"Question","name":"How do I get started?","acceptedAnswer":{"@type":"Answer","text":"Select your service category, share your zip code, and submit the request form. From there, matched providers may reach out."}},
    {"@type":"Question","name":"Can I cancel my request?","acceptedAnswer":{"@type":"Answer","text":"You may request cancellation at any time. Cancellation does not affect any obligation you may have entered into directly with a provider."}},
    {"@type":"Question","name":"Does Northbeam verify reviews or ratings?","acceptedAnswer":{"@type":"Answer","text":"Northbeam may display feedback but does not warrant its accuracy. Reviews reflect the experiences of individual users."}},
    {"@type":"Question","name":"How do I contact support?","acceptedAnswer":{"@type":"Answer","text":"Support contact options are listed in the footer of every page."}},
    {"@type":"Question","name":"Is Northbeam available outside the United States?","acceptedAnswer":{"@type":"Answer","text":"No. Northbeam's platform currently operates within the United States only."}},
    {"@type":"Question","name":"Can providers advertise on Northbeam?","acceptedAnswer":{"@type":"Answer","text":"Provider participation is governed by separate terms. Inclusion in any directory listing is not a paid endorsement or guarantee of work."}},
    {"@type":"Question","name":"Does submitting a request create a contract with Northbeam?","acceptedAnswer":{"@type":"Answer","text":"No. Submitting a request is not a contract for services. Any contract for services is between you and the independent provider you may engage."}},
    {"@type":"Question","name":"What if my location is not listed?","acceptedAnswer":{"@type":"Answer","text":"If your specific location is not yet listed, please submit a request and we will attempt to match based on the nearest covered area."}},
    {"@type":"Question","name":"Are estimates binding?","acceptedAnswer":{"@type":"Answer","text":"No. Estimates displayed on Northbeam are non-binding and provided for informational purposes only."}}
